<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Up Real</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:radial-gradient(circle,#050816,#02030a);
  color:#fff;
}

.container{
  max-width:900px;
  margin:auto;
  padding:15px;
}

h1{
  text-align:center;
  color:#00f7ff;
  text-shadow:0 0 20px #00f7ff;
}

.panel{
  background:#0b1226;
  border:1px solid #00f7ff44;
  border-radius:15px;
  padding:15px;
  margin:12px 0;
  box-shadow:0 0 25px #00f7ff22;
  transition:0.3s;
}

.panel:hover{
  transform:scale(1.01);
}

.flex{
  display:flex;
  justify-content:space-between;
}

.bar{
  height:12px;
  background:#111;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00f7ff,#00ff88);
  box-shadow:0 0 10px #00f7ff;
  transition:0.4s;
}

.task{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

button{
  background:linear-gradient(90deg,#00f7ff,#00ff88);
  border:none;
  padding:6px 12px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

button:active{
  transform:scale(0.9);
}

button.done{
  background:#222;
  color:#888;
}

.badge{
  background:#111;
  padding:6px;
  margin:6px 0;
  border-radius:8px;
  border:1px solid #00ff8844;
}

.history-card{
  background:#060b1a;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
}

.levelup{
  position:fixed;
  top:40%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:28px;
  color:#00ff88;
  text-shadow:0 0 20px #00ff88;
  display:none;
  animation:pop 1s ease;
}

@keyframes pop{
  0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}
  50%{scale:1.2}
  100%{opacity:1}
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 LEVEL UP REAL</h1>

<div class="panel">
  <div class="flex">
    <div>Nível: <span id="level"></span></div>
    <div>XP: <span id="xp"></span>/10</div>
  </div>
  <div class="bar"><div id="xpFill" class="fill"></div></div>
</div>

<div class="panel">
  <div class="flex">
    <div>Pontos</div>
    <div id="points"></div>
  </div>
</div>

<div class="panel">
  <div class="flex">
    <div>🔥 Streak</div>
    <div id="streak"></div>
  </div>
</div>

<div class="panel">
  <h3>Missões</h3>
  <div class="task">Leitura <button onclick="done(this)">+1</button></div>
  <div class="task">Escrita <button onclick="done(this)">+1</button></div>
  <div class="task">Estudo <button onclick="done(this)">+1</button></div>
  <div class="task">Falar devagar <button onclick="done(this)">+1</button></div>
  <div class="task">Bíblia <button onclick="done(this)">+1</button></div>
  <div class="task">Sem espinhas <button onclick="done(this)">+1</button></div>
  <div class="task">Menos celular <button onclick="done(this)">+1</button></div>
  <div class="task">Água <button onclick="done(this)">+1</button></div>
  <div class="task">Afazeres <button onclick="done(this)">+1</button></div>
  <div class="task">Foco <button onclick="done(this)">+1</button></div>
</div>

<div class="panel">
  <h3>🏆 Conquistas</h3>
  <div id="badges"></div>
</div>

<div class="panel">
  <h3>📊 Progresso</h3>
  <canvas id="chart" height="120"></canvas>
</div>

<div class="panel">
  <h3>📅 Histórico</h3>
  <div id="history"></div>
</div>

</div>

<div id="levelUpText" class="levelup">🔥 LEVEL UP!</div>

<script>
let data = JSON.parse(localStorage.getItem("game")) || {
  xp:0, level:1, points:0, streak:0, lastDay:null, badges:[], history:{}
};

function today(){
  return new Date().toDateString();
}

function checkDay(){
  if(data.lastDay !== today()){
    if(data.lastDay){
      data.history[data.lastDay]=data.points;

      let y=new Date();
      y.setDate(y.getDate()-1);

      data.streak = (data.lastDay===y.toDateString()) ? data.streak+1 : 1;
    } else data.streak=1;

    data.points=0;
    data.lastDay=today();
    resetButtons();
  }
}

function done(btn){
  if(btn.disabled) return;

  data.points++;
  data.xp++;

  btn.disabled=true;
  btn.innerText="✔";
  btn.classList.add("done");

  if(data.xp>=10){
    data.level++;
    data.xp=0;
    showLevelUp();
  }

  checkBadges();
  save();
  update();
}

function showLevelUp(){
  let el=document.getElementById("levelUpText");
  el.style.display="block";
  setTimeout(()=>el.style.display="none",1000);
}

function checkBadges(){
  if(data.streak>=3 && !data.badges.includes("🔥 3 dias")) data.badges.push("🔥 3 dias");
  if(data.level>=5 && !data.badges.includes("💪 Nível 5")) data.badges.push("💪 Nível 5");
  if(data.points>=8 && !data.badges.includes("⚡ Dia forte")) data.badges.push("⚡ Dia forte");
}

function drawChart(){
  let c=document.getElementById("chart");
  let ctx=c.getContext("2d");

  let keys=Object.keys(data.history).slice(-7);
  ctx.clearRect(0,0,c.width,c.height);

  keys.forEach((d,i)=>{
    let v=data.history[d];
    let x=i*50+10;
    let h=v*10;
    ctx.fillStyle="#00f7ff";
    ctx.fillRect(x,c.height-h,25,h);

    ctx.fillStyle="#fff";
    ctx.fillText(v,x,c.height-h-5);
  });
}

function renderHistory(){
  let html="";
  Object.keys(data.history).slice(-5).reverse().forEach(d=>{
    html+=`<div class="history-card">${d} - ${data.history[d]} pts</div>`;
  });
  document.getElementById("history").innerHTML=html;
}

function update(){
  document.getElementById("xp").innerText=data.xp;
  document.getElementById("level").innerText=data.level;
  document.getElementById("points").innerText=data.points;
  document.getElementById("streak").innerText=data.streak;

  document.getElementById("xpFill").style.width=(data.xp/10*100)+"%";

  document.getElementById("badges").innerHTML=
    data.badges.map(b=>`<div class="badge">${b}</div>`).join("");

  drawChart();
  renderHistory();
}

function save(){
  localStorage.setItem("game", JSON.stringify(data));
}

function resetButtons(){
  document.querySelectorAll("button").forEach(b=>{
    b.disabled=false;
    b.innerText="+1";
    b.classList.remove("done");
  });
}

checkDay();
update();
</script>

</body>
</html>
